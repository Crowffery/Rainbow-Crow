<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the Abyss - 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            color: #ff0055;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
        }
        p {
            color: #888;
            margin-bottom: 30px;
        }
        a {
            color: #00d2ff;
            text-decoration: none;
            border: 1px solid #00d2ff;
            padding: 10px 25px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        a:hover {
            background: #00d2ff;
            color: #000;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>You have strayed from the designated path. The Abyss consumed this page.</p>
    <a href="/Rainbow-Crow/">Return to the Board</a>
</body>
</html>
